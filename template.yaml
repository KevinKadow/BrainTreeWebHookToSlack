# This AWS SAM template has been generated from your function's configuration.
# If your function has one or more triggers, note that the AWS resources
# associated with these triggers aren't fully specified in this template and
# include placeholder values. Open this template in AWS Infrastructure Composer
# or your favorite IDE and modify it to specify a serverless application with
# other AWS resources.
#
# - SAM automatically generates permissions to interact with the resources
#   defined in this template. If your function needs additional permissions, add
#   Policies to the AWS::Serverless::Function resource.
AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: An AWS Serverless Application Model (SAM) template describing your function.
Resources:
  PaymentFailed:
    Type: AWS::Serverless::Function
    Properties:
      Architectures:
        - x86_64
      CodeUri: ./src
      Description: Receive notifications from Braintree and forward to slack
      Environment:
        Variables:
         BT_ENV: sandbox
         BT_MERCHANT_ID: POPULATE_ME
         BT_PRIVATE_KEY: POPULATE_ME
         SLACK_BOT_TOKEN: POPULATE_ME
         SLACK_CHANNEL_ID: POPULATE_ME
      EphemeralStorage:
        Size: 512
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: BUFFERED
      Handler: lambda_function.lambda_handler
      Layers:
      # You will need to package these new layers as ZIP files and upload to your environment.
        - arn:aws:lambda:XXXXXXXXXXXXX:layer:slack_sdk:1
        - arn:aws:lambda:XXXXXXXXXXXXX:layer:braintree:2
      LoggingConfig:
        LogFormat: Text
        LogGroup: /aws/lambda/BrainTreeWebHookToSlack
      MemorySize: 128
      PackageType: Zip
      RecursiveLoop: Terminate
      Runtime: python3.14
      RuntimeManagementConfig:
        UpdateRuntimeOn: Auto
      SnapStart:
        ApplyOn: None
      Tags: {}
      Timeout: 13
      Tracing: PassThrough
      Events:
        Trigger1Event:
          Type: HttpApi
          Properties:
            Method: ANY
            Path: /PaymentFailed
